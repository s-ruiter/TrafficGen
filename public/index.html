<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrafficGen</title>
  <link rel="stylesheet" href="/style.css">
  <script defer src="/app.js"></script>
  <script defer src="/alpine.min.js"></script>
</head>
<body x-data="trafficGen()" x-init="init()">
  <header>
    <h1>TrafficGen</h1>
    <span style="font-size:.85rem;opacity:.7">Firewall &amp; SD-WAN Traffic Generator</span>
  </header>

  <!-- vxvault status bar -->
  <div style="padding:0 1.5rem">
    <div class="vxvault-bar">
      <strong>vxvault Malware List</strong>
      <span x-text="vxvault.count > 0 ? vxvault.count + ' URLs' : 'Not cached'"></span>
      <span x-show="vxvault.timestamp" x-text="'Last updated: ' + formatDate(vxvault.timestamp)"></span>
      <span class="error" x-show="vxvault.error" x-text="vxvault.error"></span>
      <button class="btn btn-secondary" @click="refreshVxvault" :disabled="vxvault.loading">
        <span x-show="vxvault.loading" class="spinner"></span>
        <span x-text="vxvault.loading ? 'Refreshing…' : 'Refresh Now'"></span>
      </button>
    </div>
  </div>

  <div class="layout">
    <!-- Left: config panel -->
    <div>
      <div class="panel">
        <h2>Test Configuration</h2>

        <!-- Test cases -->
        <template x-for="tc in testCaseList" :key="tc.key">
          <div class="test-case-block">

            <!-- Application Control: tri-state header + two sub-rows -->
            <template x-if="tc.key === 'appControl'">
              <div>
                <h3 style="display:flex;justify-content:space-between;align-items:center"
                    x-effect="$el.querySelector('input[type=checkbox]').indeterminate = (tc.standardEnabled !== tc.heavyEnabled)">
                  <label>
                    <input type="checkbox"
                      :checked="tc.standardEnabled && tc.heavyEnabled"
                      @click="tc.standardEnabled && tc.heavyEnabled ? (tc.standardEnabled = false, tc.heavyEnabled = false) : (tc.standardEnabled = true, tc.heavyEnabled = true)">
                    <span x-text="tc.label"></span>
                  </label>
                </h3>

                <!-- Standard sub-row -->
                <div style="margin-left:1.2rem">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <label><input type="checkbox" x-model="tc.standardEnabled"> Standard list</label>
                    <span style="display:flex;align-items:center;gap:.4rem">
                      <span x-show="tc.builtinModified" style="font-size:.7rem;color:#f4a261;font-weight:600">edited</span>
                      <button class="btn btn-secondary" style="font-size:.75rem;padding:.2rem .5rem"
                        @click="openEditor('appControl', 'Application Control')">Edit</button>
                    </span>
                  </div>
                  <div class="custom-upload" x-show="tc.standardEnabled">
                    <label>
                      <input type="checkbox" x-model="tc.useCustom" :disabled="!tc.uploadInfo">
                      Use custom list
                    </label>
                    <button class="btn btn-secondary" style="font-size:.78rem;padding:.3rem .7rem"
                      @click="triggerUpload(tc.key)">Upload</button>
                    <input type="file" style="display:none" :id="'upload-' + tc.key"
                      accept=".csv,.json" @change="handleUpload(tc.key, $event)">
                    <template x-if="tc.uploadInfo">
                      <span style="display:contents">
                        <span x-text="tc.uploadInfo.filename + ' (' + tc.uploadInfo.count + ' URLs)'"></span>
                        <button class="btn btn-secondary" style="font-size:.78rem;padding:.3rem .5rem;color:#e63946"
                          @click="deleteUpload(tc.key)">✕</button>
                      </span>
                    </template>
                  </div>
                </div>

                <!-- Boost sub-row -->
                <div style="margin-left:1.2rem;margin-top:.4rem">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <label><input type="checkbox" x-model="tc.heavyEnabled"> Boost (Facebook, Microsoft Office &amp; Google Workspace)</label>
                    <span style="display:flex;align-items:center;gap:.4rem">
                      <span x-show="tc.heavyBuiltinModified" style="font-size:.7rem;color:#f4a261;font-weight:600">edited</span>
                      <button class="btn btn-secondary" style="font-size:.75rem;padding:.2rem .5rem"
                        @click="openEditor('appControlHeavy', 'Boost List')">Edit</button>
                    </span>
                  </div>
                </div>
              </div>
            </template>

            <!-- All other test cases: original layout unchanged -->
            <template x-if="tc.key !== 'appControl'">
              <div>
                <h3 style="display:flex;justify-content:space-between;align-items:center">
                  <label><input type="checkbox" x-model="tc.enabled"> <span x-text="tc.label"></span></label>
                  <span style="display:flex;align-items:center;gap:.4rem">
                    <span x-show="tc.builtinModified" style="font-size:.7rem;color:#f4a261;font-weight:600">edited</span>
                    <button x-show="tc.key !== 'malware'" class="btn btn-secondary"
                      style="font-size:.75rem;padding:.2rem .5rem" @click="openEditor(tc.key, tc.label)">Edit</button>
                  </span>
                </h3>
                <div class="custom-upload" x-show="tc.enabled">
                  <label>
                    <input type="checkbox" x-model="tc.useCustom" :disabled="!tc.uploadInfo">
                    Use custom list
                  </label>
                  <button class="btn btn-secondary" style="font-size:.78rem;padding:.3rem .7rem"
                    @click="triggerUpload(tc.key)">Upload</button>
                  <input type="file" style="display:none" :id="'upload-' + tc.key"
                    accept=".csv,.json" @change="handleUpload(tc.key, $event)">
                  <template x-if="tc.uploadInfo">
                    <span style="display:contents">
                      <span x-text="tc.uploadInfo.filename + ' (' + tc.uploadInfo.count + ' URLs)'"></span>
                      <button class="btn btn-secondary" style="font-size:.78rem;padding:.3rem .5rem;color:#e63946"
                        @click="deleteUpload(tc.key)">✕</button>
                    </span>
                  </template>
                </div>
              </div>
            </template>

          </div>
        </template>

        <!-- Source IPs -->
        <div style="margin-top:1rem">
          <strong style="font-size:.9rem">Source IPs</strong>
          <div class="ip-list" x-show="interfaces.length > 0">
            <template x-for="iface in interfaces" :key="iface.ip">
              <label>
                <input type="checkbox" :value="iface.ip" x-model="selectedIps">
                <span x-text="iface.name + ' — ' + iface.ip"></span>
              </label>
            </template>
          </div>
          <p x-show="interfaces.length === 0" style="font-size:.85rem;color:#888;margin-top:.5rem">
            No network interfaces found.
          </p>
        </div>

        <!-- Runtime -->
        <div class="repeat-row">
          <label>Runtime (minutes):</label>
          <input type="number" x-model.number="runtimeMinutes" min="1" max="240" step="1" style="width:5rem">
        </div>

        <!-- Actions -->
        <div class="action-row">
          <button class="btn btn-primary" @click="startRun"
            :disabled="!canStart" x-show="!isRunning">Start</button>
          <button class="btn btn-danger" @click="stopRun" x-show="isRunning">Stop</button>
        </div>

        <!-- Progress bar -->
        <div x-show="isRunning" style="margin-top:.75rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-size:.85rem;color:#555">
            <span x-text="formatRemaining()"></span>
            <span x-text="totalSeconds > 0 ? Math.round(elapsedSeconds / totalSeconds * 100) + '%' : '0%'"></span>
          </div>
          <div style="background:#e8e8e8;border-radius:6px;height:10px;overflow:hidden">
            <div :style="'width:' + (totalSeconds > 0 ? Math.min(elapsedSeconds / totalSeconds * 100, 100) : 0) + '%;background:#2a9d8f;height:100%;border-radius:6px;transition:width .4s linear'"></div>
          </div>
        </div>

        <p x-show="statusMessage" style="margin-top:.75rem;font-size:.85rem;color:#555"
          x-text="statusMessage"></p>
      </div>
    </div>

    <!-- Right: dashboard + log -->
    <div>
      <!-- Category cards -->
      <div class="cards-grid">
        <template x-for="card in categoryCards" :key="card.key">
          <div class="card">
            <div class="card-label" x-text="card.testCase"></div>
            <div class="card-title" x-text="card.category"></div>
            <div class="card-stats">
              <span class="stat-success" x-text="'✓ ' + card.success"></span>&nbsp;
              <span class="stat-failed" x-text="'✗ ' + card.failed"></span>&nbsp;
              <span class="stat-total" x-text="'/ ' + card.total"></span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill"
                :style="'width:' + (card.total > 0 ? Math.round(card.success/card.total*100) : 0) + '%'">
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Request log -->
      <div class="panel">
        <h2>Request Log
          <span x-show="requests.length > 0" style="font-weight:400;font-size:.85rem;color:#888"
            x-text="' — ' + requests.length + ' requests'"></span>
        </h2>
        <div class="log-scroll" x-show="requests.length > 0">
          <table class="log-table">
            <thead>
              <tr>
                <th style="min-width:70px">Time</th>
                <th style="min-width:110px">Test Case</th>
                <th style="min-width:130px">Category</th>
                <th style="min-width:360px">URL</th>
                <th style="min-width:120px">Source IP</th>
                <th style="min-width:80px">Status</th>
                <th style="min-width:60px">Code</th>
                <th style="min-width:80px">Time (ms)</th>
                <th>Error</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="r in requests" :key="r._id">
                <tr :class="r.status === 'failed' ? 'failed' : ''">
                  <td x-text="r.time"></td>
                  <td x-text="r.testCase"></td>
                  <td x-text="r.category"></td>
                  <td x-text="r.url" style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></td>
                  <td x-text="r.sourceIp"></td>
                  <td>
                    <span class="badge" :class="r.status === 'success' ? 'badge-success' : 'badge-failed'"
                      x-text="r.status"></span>
                  </td>
                  <td x-text="r.statusCode ?? '—'"></td>
                  <td x-text="r.responseTime"></td>
                  <td x-text="r.error ?? ''"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <p x-show="requests.length === 0" style="font-size:.85rem;color:#888">
          No requests yet. Start a test to see results.
        </p>
      </div>
    </div>
  </div>

  <!-- Built-in list editor -->
  <div x-show="editor.testCase" style="padding:0 1.5rem 1.5rem">
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
        <h2 x-text="'Edit: ' + editor.label"></h2>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
          <span style="font-size:.8rem;color:#888" x-text="editor.entries.length + ' URLs'"></span>
          <span style="font-size:.8rem;color:#f4a261;font-weight:600" x-show="!editor.isDefault">• edited</span>
          <button class="btn btn-secondary" style="font-size:.85rem" @click="resetBuiltin" x-show="!editor.isDefault">Reset to Default</button>
          <button class="btn btn-primary" style="font-size:.85rem" @click="saveBuiltin" :disabled="!editor.dirty || editor.saving">
            <span x-text="editor.saving ? 'Saving…' : 'Save'"></span>
          </button>
          <button class="btn btn-secondary" style="font-size:.85rem" @click="closeEditor">Close</button>
        </div>
      </div>
      <div style="max-height:420px;overflow-y:auto;border:1px solid #e8e8e8;border-radius:6px">
        <table class="log-table">
          <thead>
            <tr><th>Name</th><th>URL</th><th>Category</th><th style="width:2rem"></th></tr>
          </thead>
          <tbody>
            <template x-for="(entry, i) in editor.entries" :key="i">
              <tr>
                <td><input type="text" x-model="entry.name" @input="editor.dirty=true" style="width:100%;border:1px solid #e0e0e0;padding:.25rem .4rem;border-radius:3px;font-size:.8rem"></td>
                <td><input type="text" x-model="entry.url" @input="editor.dirty=true" style="width:100%;border:1px solid #e0e0e0;padding:.25rem .4rem;border-radius:3px;font-size:.8rem;min-width:220px"></td>
                <td><input type="text" x-model="entry.category" @input="editor.dirty=true" style="width:100%;border:1px solid #e0e0e0;padding:.25rem .4rem;border-radius:3px;font-size:.8rem"></td>
                <td><button @click="removeEditorRow(i)" style="background:none;border:none;color:#bbb;cursor:pointer;font-size:.9rem;padding:.1rem .3rem" title="Remove">✕</button></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <button class="btn btn-secondary" style="margin-top:.75rem;font-size:.85rem" @click="addEditorRow">+ Add URL</button>
    </div>
  </div>
</body>
</html>
